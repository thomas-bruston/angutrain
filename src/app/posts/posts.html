<div>
    <H1>Liste des posts</H1>
   
    <input
    type="text"
    placeholder="Rechercher un post..."
    [(ngModel)]="recherche"
    (input)="onRecherche()">

    <p>{{postsFiltres.length}} résultat(s)</p>

     @for (post of postsFiltres; track post.id) {
       <div class="post">
      <h3>{{ post.title }}</h3>
      <p>{{ post.body }}</p>
    </div>
  }

</div>
