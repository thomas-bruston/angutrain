<div>
    <h2>Nos Produits</h2>
    <p>Total panier : {{ getNbArticles() }}</p>

    <div class="liste">
        @for (produit of produits; track produit.id){
            <app-carte-produit
            [id] = "produit.id"
            [nom] = "produit.nom"
            [prix] = "produit.prix"
            [disponible] = "produit.disponible"
            (ajouterAuPanier) = "onAjout(produit)">
            </app-carte-produit>
        }
    </div>
</div>
