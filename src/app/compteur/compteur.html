<div class = "compteur">
    <H2> compteur</H2>
        <p>Progression : {{progression()}} % </p>

    <button (click)="incrementer()" [disabled]="estAuMax()">ajouter</button>
    <button (click)="decrementer()" [disabled]="estAZero()">diminuer</button>
    <button (click)="reset()">reset</button>

    @if(estAuMax()){
        <p>Maximum atteint !</p>
}
</div>
